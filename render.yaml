services:
  - type: web
    name: cms-api
    runtime: python
    region: oregon
    rootDir: .
    buildCommand: bash build.sh
    startCommand: cd cms-backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: STATIC_DIR
        value: /opt/render/project/src/cms-admin/dist
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: FERNET_KEY
        sync: false
      - key: CF_ACCOUNT_ID
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: ADMIN_FRONTEND_URL
        sync: false
      - key: SUPERADMIN_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: NODE_VERSION
        value: "20.11.0"
